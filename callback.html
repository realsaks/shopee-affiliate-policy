<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>TikTok Auth Callback</title>
<style>body{font-family:sans-serif;max-width:600px;margin:60px auto;padding:0 20px;text-align:center}
code{background:#f0f0f0;padding:8px 16px;border-radius:6px;display:block;word-break:break-all;margin:16px 0;font-size:14px;text-align:left}
button{background:#000;color:#fff;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-size:14px}
</style></head>
<body>
<h2>TikTok Authorization</h2>
<div id="out"></div>
<script>
const p = new URLSearchParams(window.location.search);
const code = p.get("code");
const err = p.get("error");
if (code) {
  document.getElementById("out").innerHTML =
    "<p>Copy URL ทั้งหมดด้านล่าง:</p><code>" + window.location.href + "</code>" +
    "<button onclick=navigator.clipboard.writeText(window.location.href).then(()=>this.textContent='Copied!')">Copy URL</button>";
} else if (err) {
  document.getElementById("out").innerHTML = "<p style=color:red>Error: " + err + "</p>";
} else {
  document.getElementById("out").innerHTML = "<p>No code found</p>";
}
</script>
</body></html>
